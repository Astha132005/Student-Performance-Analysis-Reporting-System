<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPARS : Student Search</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}"></head>

<body>

<div class="centered-container">
    <div class="glass-panel" style="padding: 3rem; text-align: center; max-width: 520px; width: 100%;">

        <h1 style="font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.25rem;">SPARS</h1>
        <p style="margin-bottom: 2rem;">Student Performance Analysis & Reporting System</p>

        <!-- Search Student -->
        <h2>Search Student</h2>
        <p class="mb-lg">Check student performance by Registration Number.</p>

        <form method="get" onsubmit="redirectToStudent(event)" style="display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem;">
            <input type="text" id="roll" placeholder="Enter Registration Number" required>
            <button type="submit">
                <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                Search
            </button>
        </form>

        <hr>

        <!-- Quick Navigation -->
        <h2>Quick Access</h2>

        <div style="display: flex; flex-direction: column; gap: 0.6rem; margin-top: 1rem;">
            <a href="/admin_dashboard" class="glass-card" style="padding: 0.85rem; display: flex; align-items: center; gap: 0.75rem;">
                <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:var(--primary);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                Admin Dashboard
            </a>
            <a href="/batch_analysis" class="glass-card" style="padding: 0.85rem; display: flex; align-items: center; gap: 0.75rem;">
                <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:var(--primary);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                Batch Analysis
            </a>
            <a href="/subject_analysis" class="glass-card" style="padding: 0.85rem; display: flex; align-items: center; gap: 0.75rem;">
                <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:var(--primary);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                Subject Analysis
            </a>
        </div>

    </div>
</div>

<script>
function redirectToStudent(event) {
    event.preventDefault();
    const roll = document.getElementById("roll").value;
    window.location.href = "/student?search=" + roll;
}
</script>

</body>
</html>
